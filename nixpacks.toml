# Nixpacks configuration for SmartShield ML API in monorepo
# This file tells Nixpacks to build the Python service from packages/ml directory

[phases.setup]
nixPkgs = ["python310", "gcc", "zlib"]

[phases.install]
dependsOn = ["setup"]
paths = ["packages/ml"]
cmds = [
  "python -m ensurepip --upgrade",
  "python -m pip install --no-cache-dir -r packages/ml/requirements.txt"
]

[phases.build]
cmds = ["echo 'Build complete'"]

[start]
cmd = "cd packages/ml && python start.py"

[variables]
PYTHONUNBUFFERED = "1"
