# Nixpacks configuration for SmartShield ML API in monorepo
# This file tells Nixpacks to build the Python service from packages/ml directory

[phases.setup]
nixPkgs = ["python310", "pip", "gcc", "zlib"]

[phases.install]
dependsOn = ["setup"]
paths = ["packages/ml"]
cmds = [
  "pip install --upgrade pip",
  "pip install -r packages/ml/requirements.txt"
]

[phases.build]
cmds = ["echo 'Build complete'"]

[start]
cmd = "cd packages/ml && gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 wsgi:app"

[variables]
PYTHONUNBUFFERED = "1"
