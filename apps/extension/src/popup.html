<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SmartShield</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-primary: #0f0f1e;
        --bg-secondary: #1a1a2e;
        --bg-tertiary: #16213e;
        --text-primary: #ffffff;
        --text-secondary: #b0b5c8;
        --text-tertiary: #7a8096;
        --primary-color: #6366f1;
        --primary-dark: #4f46e5;
        --primary-light: #818cf8;
        --accent-success: #10b981;
        --accent-warning: #f59e0b;
        --accent-danger: #ef4444;
        --input-bg: rgba(255, 255, 255, 0.04);
        --input-border: rgba(255, 255, 255, 0.08);
        --input-border-focus: rgba(99, 102, 241, 0.3);
        --glass-border: rgba(255, 255, 255, 0.1);
        --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      body {
        width: 380px;
        min-height: 100vh;
        font-family:
          "Poppins",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        margin: 0;
        background: linear-gradient(
          135deg,
          var(--bg-primary) 0%,
          var(--bg-secondary) 100%
        );
        color: var(--text-primary);
        position: relative;
        overflow-y: auto;
        overflow-x: hidden;
      }

      /* Aurora Effect Background */
      .aurora-bg {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: -1;
        background:
          radial-gradient(
            circle at 80% -20%,
            rgba(99, 102, 241, 0.15) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 20% 120%,
            rgba(139, 92, 246, 0.1) 0%,
            transparent 50%
          );
        pointer-events: none;
      }

      .container {
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-height: 100vh;
      }

      /* Utility Classes */
      .hidden {
        display: none !important;
      }
      .text-center {
        text-align: center;
      }
      .flex {
        display: flex;
      }
      .flex-col {
        flex-direction: column;
      }
      .justify-between {
        justify-content: space-between;
      }
      .items-center {
        align-items: center;
      }
      .w-full {
        width: 100%;
      }
      .gap-2 {
        gap: 0.5rem;
      }
      .mb-4 {
        margin-bottom: 1rem;
      }
      .mt-4 {
        margin-top: 1rem;
      }
      .text-sm {
        font-size: 0.875rem;
      }

      /* Typography */
      h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.5px;
        text-align: center;
        color: var(--text-primary);
      }
      h2 {
        margin: 0 0 8px 0;
        font-size: 18px;
        font-weight: 600;
        text-align: center;
        color: var(--text-primary);
      }
      .tagline {
        margin: 4px 0 0 0;
        color: var(--text-secondary);
        font-size: 12px;
        text-align: center;
        font-weight: 500;
        letter-spacing: 0.3px;
      }
      p {
        margin: 0;
        color: var(--text-tertiary);
        line-height: 1.6;
        font-size: 13px;
      }

      /* Inputs */
      .form-group {
        margin-bottom: 14px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        color: var(--text-tertiary);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }

      input {
        width: 100%;
        padding: 11px 14px;
        box-sizing: border-box;
        background: var(--input-bg);
        border: 1px solid var(--input-border);
        color: var(--text-primary);
        border-radius: 10px;
        outline: none;
        transition: var(--transition-smooth);
        font-size: 14px;
        font-family: "Poppins", inherit;
      }

      input::placeholder {
        color: var(--text-tertiary);
      }

      input:focus {
        border-color: var(--input-border-focus);
        background: rgba(255, 255, 255, 0.06);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      }

      /* Buttons */
      .btn {
        width: 100%;
        padding: 12px 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: var(--transition-smooth);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-family: "Poppins", inherit;
      }

      .btn-primary {
        background: linear-gradient(
          135deg,
          var(--primary-color) 0%,
          var(--primary-light) 100%
        );
        color: white;
        box-shadow: 0 10px 28px rgba(99, 102, 241, 0.25);
      }

      .btn-primary:hover {
        background: linear-gradient(
          135deg,
          var(--primary-dark) 0%,
          var(--primary-color) 100%
        );
        transform: translateY(-2px);
        box-shadow: 0 14px 36px rgba(99, 102, 241, 0.35);
      }

      .btn-primary:active {
        transform: translateY(0);
      }

      .btn-google {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text-primary);
        margin-bottom: 16px;
        border: 1px solid var(--glass-border);
      }

      .btn-google:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.15);
      }

      .divider {
        display: flex;
        align-items: center;
        text-align: center;
        color: var(--text-tertiary);
        margin: 16px 0;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        font-weight: 500;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .divider::before {
        margin-right: 12px;
      }
      .divider::after {
        margin-left: 12px;
      }

      .btn-link {
        background: none;
        border: none;
        color: var(--primary-color);
        cursor: pointer;
        padding: 0;
        font-size: 0.875rem;
        font-weight: 600;
        transition: var(--transition-smooth);
      }
      .btn-link:hover {
        color: var(--primary-light);
      }

      /* Dashboard Card */
      .status-card {
        background: linear-gradient(
          135deg,
          rgba(99, 102, 241, 0.1) 0%,
          rgba(139, 92, 246, 0.05) 100%
        );
        backdrop-filter: blur(20px);
        border: 1px solid rgba(99, 102, 241, 0.15);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 16px;
        text-align: center;
        position: relative;
        overflow: hidden;
        transition: var(--transition-smooth);
      }

      .status-card:hover {
        background: linear-gradient(
          135deg,
          rgba(99, 102, 241, 0.15) 0%,
          rgba(139, 92, 246, 0.1) 100%
        );
        border-color: rgba(99, 102, 241, 0.25);
        box-shadow: 0 12px 32px rgba(99, 102, 241, 0.15);
      }

      .status-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
      }

      .status-icon {
        font-size: 56px;
        margin-bottom: 16px;
        display: block;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      /* Loading Spinner */
      .loader {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top-color: var(--primary-light);
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .logo-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        gap: 6px;
        padding: 8px 0;
      }

      .logo-header img {
        filter: drop-shadow(0 8px 16px rgba(99, 102, 241, 0.25));
        transition: transform 0.3s ease;
      }

      .logo-header img:hover {
        transform: scale(1.05);
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.15);
      }
    </style>
  </head>
  <body>
    <div class="aurora-bg"></div>

    <div class="container">
      <!-- Header -->
      <div class="logo-header">
        <img
          src="images/light-logo-extension.png"
          alt="SmartShield"
          width="40"
          height="40"
          style="object-fit: contain"
        />
        <h1>SmartShield</h1>
        <p class="tagline">AI-Powered Phishing Detector</p>
      </div>

      <!-- AUTH: LOGIN VIEW -->
      <div id="login-view" class="view">
        <h2 class="text-center" style="margin-bottom: 28px; margin-top: 8px">
          Welcome Back
        </h2>

        <button id="google-login-btn" class="btn btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path
              d="M17.64 9.2c0-.637-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
              fill="#4285F4"
            />
            <path
              d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.836.86-3.048.86-2.344 0-4.328-1.584-5.036-3.715H.957v2.332A8.997 8.997 0 0 0 9 18z"
              fill="#34A853"
            />
            <path
              d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"
              fill="#FBBC05"
            />
            <path
              d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.159 6.656 3.58 9 3.58z"
              fill="#EA4335"
            />
          </svg>
          Sign in with Google
        </button>

        <div class="divider">or continue with email</div>

        <form id="login-form">
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="login-email"
              placeholder="name@example.com"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="login-password"
              placeholder="••••••••"
              required
            />
          </div>
          <div
            id="login-error"
            class="hidden"
            style="
              color: var(--accent-danger);
              font-size: 12px;
              margin-bottom: 12px;
              text-align: center;
              background: rgba(239, 68, 68, 0.1);
              padding: 8px;
              border-radius: 6px;
              border: 1px solid rgba(239, 68, 68, 0.2);
            "
          ></div>
          <button type="submit" class="btn btn-primary">Sign In</button>
        </form>

        <div class="text-center mt-4 text-sm">
          <span style="color: var(--text-tertiary)"
            >Don't have an account?</span
          >
          <button id="goto-signup" class="btn-link">Sign up</button>
        </div>
      </div>

      <!-- AUTH: SIGNUP VIEW -->
      <div id="signup-view" class="view hidden">
        <button id="back-to-login" class="btn-link" style="margin-bottom: 8px">
          ← Back
        </button>
        <h2 class="text-center" style="margin-bottom: 8px">Create Account</h2>

        <form id="signup-form">
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="signup-email"
              placeholder="name@example.com"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="signup-password"
              placeholder="••••••••"
              required
            />
          </div>
          <div class="form-group" style="margin-bottom: 6px">
            <label>Confirm Password</label>
            <input
              type="password"
              id="signup-confirm-password"
              placeholder="••••••••"
              required
            />
          </div>
          <div
            id="signup-error"
            class="hidden"
            style="
              color: var(--accent-danger);
              font-size: 12px;
              margin-bottom: 12px;
              text-align: center;
              background: rgba(239, 68, 68, 0.1);
              padding: 8px;
              border-radius: 6px;
              border: 1px solid rgba(239, 68, 68, 0.2);
            "
          ></div>
          <button type="submit" class="btn btn-primary">Sign Up</button>
        </form>
      </div>

      <!-- DASHBOARD VIEW -->
      <div id="dashboard-view" class="view hidden">
        <div class="status-card">
          <span id="status-icon" class="status-icon">🛡️</span>
          <h2 id="status-title" style="margin-bottom: 8px">Protected</h2>
          <p id="status-desc" style="font-size: 14px">
            This website appears safe.
          </p>

          <div
            id="scan-warnings"
            class="hidden"
            style="
              margin-top: 16px;
              text-align: left;
              background: rgba(245, 158, 11, 0.08);
              padding: 12px 14px;
              border-radius: 10px;
              border: 1px solid rgba(245, 158, 11, 0.15);
            "
          >
            <strong
              style="
                color: var(--accent-warning);
                display: block;
                margin-bottom: 6px;
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.3px;
              "
            >
              ⚠️ Risk Factors</strong
            >
            <div
              id="warning-list"
              style="
                font-size: 12px;
                color: var(--text-secondary);
                line-height: 1.5;
              "
            ></div>
          </div>
        </div>

        <button id="scan-btn" class="btn btn-primary mb-4">
          <span>Scan Current Page</span>
        </button>

        <div
          class="flex justify-between items-center"
          style="
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
          "
        >
          <div style="display: flex; flex-direction: column">
            <span
              style="
                font-size: 10px;
                color: var(--text-tertiary);
                text-transform: uppercase;
                letter-spacing: 0.3px;
                margin-bottom: 2px;
              "
              >Signed in as</span
            >
            <span
              id="user-display"
              style="
                font-size: 13px;
                font-weight: 500;
                color: var(--text-primary);
              "
              >user@example.com</span
            >
          </div>
          <button
            id="logout-btn"
            style="
              background: rgba(255, 255, 255, 0.06);
              border: 1px solid rgba(255, 255, 255, 0.1);
              padding: 8px 16px;
              border-radius: 8px;
              color: var(--text-secondary);
              cursor: pointer;
              font-size: 12px;
              font-weight: 600;
              transition: var(--transition-smooth);
            "
            onmouseover="this.style.background='rgba(255, 255, 255, 0.1)'; this.style.borderColor='rgba(255, 255, 255, 0.15)'"
            onmouseout="this.style.background='rgba(255, 255, 255, 0.06)'; this.style.borderColor='rgba(255, 255, 255, 0.1)'"
          >
            Logout
          </button>
        </div>
      </div>

      <!-- LOADING OVERLAY -->
      <div
        id="loading-overlay"
        class="hidden"
        style="
          position: fixed;
          inset: 0;
          background: rgba(15, 15, 30, 0.85);
          backdrop-filter: blur(8px);
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 50;
        "
      >
        <div class="loader"></div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
